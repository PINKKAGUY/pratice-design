<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!--
    PK Monogram: <PK>
    Rose-gold / copper metallic logo
    4 groups for animation: chevron-left, p, k, chevron-right
  -->

  <!-- Left chevron < — diamond-shaped angular bracket -->
  <g class="logo-chevron-left">
    <polygon points="22,100 56,66 66,76 42,100 66,124 56,134"
             fill="#c4956a" />
  </g>

  <!-- Letter P — vertical stem with serifs + elegant bowl -->
  <g class="logo-p">
    <!-- Vertical stem with top and bottom serifs -->
    <path d="M72,50 L88,50 L88,150 L72,150 L72,50 Z
             M66,50 L94,50 L94,56 L66,56 Z
             M66,144 L94,144 L94,150 L66,150 Z"
          fill="#c4956a" fill-rule="nonzero" />
    <!-- P bowl — elegant rounded top -->
    <path d="M82,56 L110,56 C128,56 134,66 134,78 C134,90 128,100 110,100 L88,100 L88,90 L108,90 C120,90 124,84 124,78 C124,72 120,66 108,66 L82,66 Z"
          fill="#c4956a" />
  </g>

  <!-- Letter K — diagonal arms from midpoint of shared stem -->
  <g class="logo-k">
    <!-- Upper arm of K (goes up-right from stem middle) -->
    <path d="M88,96 L124,58 L136,58 L136,64 L98,102 Z" fill="#c4956a" />
    <!-- Lower leg of K (goes down-right from stem middle) -->
    <path d="M98,102 L136,140 L136,146 L124,146 L88,108 Z" fill="#c4956a" />
  </g>

  <!-- Right chevron > — diamond-shaped angular bracket -->
  <g class="logo-chevron-right">
    <polygon points="178,100 144,66 134,76 158,100 134,124 144,134"
             fill="#c4956a" />
  </g>
</svg>
